name: Ejecutar boletin

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: |
          pip install pandas selenium oracledb chromedriver-autoinstaller

      - name: Ejecutar script
        run: python boletin_concursal.py
